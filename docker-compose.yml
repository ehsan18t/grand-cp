services:
  preview:
    image: node:22-bookworm
    working_dir: /app
    ports:
      - "8787:8787"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - app_pnpm_store:/pnpm-store
    command: >-
      /bin/sh -lc "corepack enable && pnpm config set store-dir /pnpm-store &&
      pnpm install --no-frozen-lockfile && pnpm exec opennextjs-cloudflare build &&
      pnpm exec wrangler dev --config wrangler.jsonc --ip 0.0.0.0 --port 8787"

volumes:
  app_node_modules:
  app_pnpm_store:
